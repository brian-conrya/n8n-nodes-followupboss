# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open your package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: brian-conrya
#        Repository name:  n8n-nodes-followupboss
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens → Generate New Token → Granular Access Token.
#   2. In GitHub: Settings → Secrets → Actions → New secret named NPM_TOKEN.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run locally:
#   npm run release
#
# This lints, builds, bumps version, commits, tags, and pushes.
# The tag push triggers this workflow to publish to npm with provenance.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npx release-it --ci --no-git --npm.publish --npm.provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
